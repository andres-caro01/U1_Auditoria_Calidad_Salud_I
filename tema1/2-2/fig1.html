<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciclo PAMEC · Mejora continua</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }

        /* Contenedor tipo grid 3x3 – claro y modular */
        .ciclo-grid {
            display: grid;
            grid-template-columns: 160px 160px 160px;
            grid-template-rows: 160px 160px 160px;
            gap: 16px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            padding: 24px;
            border-radius: 48px;
            box-shadow: 0 20px 30px -10px rgba(0,30,50,0.3),
                        inset 0 -2px 5px rgba(255,255,255,0.8);
        }

        /* Estilo base para todas las celdas */
        .celda {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            border-radius: 28px;
            background: white;
            color: #1a3e60;
            box-shadow: 0 10px 0 #b0c4d9, 0 8px 20px rgba(0,20,40,0.2);
            border: 2px solid white;
            transition: all 0.2s ease;
            padding: 12px;
            word-break: break-word;
        }

        .celda:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #9bb0c5, 0 12px 25px rgba(0,30,50,0.25);
        }

        /* Diferenciación suave por posición (opcional, solo estética) */
        .planear {
            background: #c8e6f5;
            color: #035a7a;
        }
        .hacer {
            background: #d1f0d1;
            color: #1d6b2c;
        }
        .verificar {
            background: #fff2c9;
            color: #8d6e00;
        }
        .actuar {
            background: #fad7d7;
            color: #a13131;
        }
        .centro {
            background: #ecd4ff;
            color: #4b2b6e;
            font-size: 1.8rem;
            font-weight: 800;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 0 #b395cf, 0 8px 25px #2c1a3e55;
        }

        /* Asignación exacta a las celdas del grid 3x3 */
        .planear { grid-area: 1 / 2 / 2 / 3; }  /* fila 1, columna 2 – arriba centro */
        .hacer   { grid-area: 2 / 3 / 3 / 4; }  /* fila 2, columna 3 – derecha centro */
        .verificar{ grid-area: 3 / 2 / 4 / 3; } /* fila 3, columna 2 – abajo centro */
        .actuar  { grid-area: 2 / 1 / 3 / 2; }  /* fila 2, columna 1 – izquierda centro */
        .centro  { grid-area: 2 / 2 / 3 / 3; }  /* justo al medio */

        /* Ajuste para pantallas pequeñas: se achica el grid manteniendo proporción */
        @media (max-width: 600px) {
            .ciclo-grid {
                grid-template-columns: 120px 120px 120px;
                grid-template-rows: 120px 120px 120px;
                gap: 10px;
                padding: 16px;
            }
            .celda {
                font-size: 1rem;
            }
            .centro {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="ciclo-grid">
        <!-- Cada palabra se coloca en su posición estructural -->
        <div class="celda planear">PLANEAR</div>
        <div class="celda hacer">HACER</div>
        <div class="celda verificar">VERIFICAR</div>
        <div class="celda actuar">ACTUAR</div>
        <div class="celda centro">PAMEC</div>
    </div>
</body>
</html>
