<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAMEC · ciclo minimalista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
        }

        /* contenedor grid 3×3 — minimal, sin sombras pesadas */
        .pamec-grid {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            grid-template-rows: repeat(3, 150px);
            gap: 1rem;
            background: transparent;
            padding: 1rem;
        }

        /* celda base: minimalista, borde sutil, fondo blanco */
        .celda {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
            font-size: 1.3rem;
            letter-spacing: 0.3px;
            color: #1e2b3c;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 24px;
            border: 1px solid rgba(0, 20, 40, 0.12);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            padding: 0.75rem;
            word-break: break-word;

            /* animación de entrada (fade + ligero zoom) */
            animation: aparecer 0.6s cubic-bezier(0.12, 0.71, 0.33, 1) forwards;
            opacity: 0;
            transform: scale(0.92);
        }

        .celda:hover {
            border-color: #8a9db0;
            background: #ffffff;
            box-shadow: 0 6px 12px rgba(0,20,40,0.04);
            transform: scale(1.01) translateY(-2px);
        }

        /* animación con retraso para cada posición (efecto cascada) */
        .planear { animation-delay: 0.1s; }
        .hacer   { animation-delay: 0.2s; }
        .verificar{ animation-delay: 0.3s; }
        .actuar  { animation-delay: 0.4s; }
        .centro  { animation-delay: 0.5s; }

        @keyframes aparecer {
            0% { opacity: 0; transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* colores tenues y planos para cada etapa (minimal, casi acromáticos) */
        .planear {
            background: #eaf1f8;
            color: #1e4d6f;
        }
        .hacer {
            background: #eaf4e8;
            color: #1f6a3b;
        }
        .verificar {
            background: #fcf2dd;
            color: #866b2c;
        }
        .actuar {
            background: #fae6e6;
            color: #aa3c3c;
        }
        .centro {
            background: #f0e7fc;
            color: #4b3270;
            font-weight: 600;
            font-size: 1.8rem;
            border: 2px solid #ffffff;
        }

        /* posiciones fijas en el grid 3×3 */
        .planear { grid-area: 1 / 2 / 2 / 3; } /* arriba centro */
        .hacer   { grid-area: 2 / 3 / 3 / 4; } /* derecha centro */
        .verificar{ grid-area: 3 / 2 / 4 / 3; } /* abajo centro */
        .actuar  { grid-area: 2 / 1 / 3 / 2; } /* izquierda centro */
        .centro  { grid-area: 2 / 2 / 3 / 3; } /* medio */

        /* responsivo: celdas más pequeñas en móvil */
        @media (max-width: 600px) {
            .pamec-grid {
                grid-template-columns: repeat(3, 110px);
                grid-template-rows: repeat(3, 110px);
                gap: 0.7rem;
            }
            .celda {
                font-size: 1rem;
            }
            .centro {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="pamec-grid">
        <div class="celda planear">PLANEAR</div>
        <div class="celda hacer">HACER</div>
        <div class="celda verificar">VERIFICAR</div>
        <div class="celda actuar">ACTUAR</div>
        <div class="celda centro">PAMEC</div>
    </div>
</body>
</html>
