<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso de Repaso 2: Calidad en Salud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #004F67;
            --primary-dark: #00779A;
            --accent: #054C50;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #004F67;
            background-color: #f0f5f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 850px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: #f0fdfa;
        }

        /* Estilos para Drag and Drop */
        .drop-zone {
            display: inline-block;
            min-width: 120px;
            border-bottom: 3px solid var(--primary);
            margin: 0 5px;
            text-align: center;
            vertical-align: middle;
            height: 35px;
            background: #f8fafc;
        }

        .drag-word {
            display: inline-block;
            padding: 5px 15px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: grab;
            margin: 5px;
            font-size: 0.9em;
            user-select: none;
        }

        .drag-word:active { cursor: grabbing; }

        .correct-word { color: #15803d; font-weight: bold; border-bottom: 3px solid #15803d; }
        .incorrect-word { color: #b91c1c; font-weight: bold; border-bottom: 3px solid #b91c1c; text-decoration: line-through; }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold text-[#004F67] mb-6 leading-tight">Ejercicios de Repaso 2</h1>
            <p class="mb-4 text-slate-600 font-semibold">PAMEC y Modelos de Evaluación</p>
            <p class="mb-12 max-w-2xl text-slate-500">Pon a prueba tus conocimientos sobre la ruta crítica del PAMEC y el modelo de Donabedian.</p>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-10 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-[#004F67] text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-[#004F67] transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content">
                <p id="q-instruction" class="text-[#004F67] font-bold italic mb-2 text-base"></p>
                <h2 id="q-text" class="text-xl font-bold mb-6 leading-snug"></h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="drag-container" class="hidden">
                    <div id="drag-text-area" class="p-6 bg-slate-50 rounded-3xl text-xl leading-relaxed mb-8">
                        </div>
                    <div id="words-bank" class="p-4 border-2 border-dashed border-slate-300 rounded-3xl flex flex-wrap justify-center min-height-[100px]">
                        </div>
                </div>

                <div id="feedback-box" class="hidden mt-6 p-6 rounded-3xl border-2 animate__animated animate__fadeInUp">
                    <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                    <div id="feedback-body" class="text-base leading-relaxed text-slate-700"></div>
                    <button onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-10 py-2 rounded-xl hover:bg-black transition-all font-bold">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-8 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">Resultado Final</h2>
            <div class="relative flex items-center justify-center my-6">
                <svg class="w-64 h-64 -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="128" cy="128" r="110" class="circle-bar" stroke-dasharray="691" stroke-dashoffset="691"></circle>
                </svg>
                <div class="absolute text-6xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-2xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-6 bg-slate-50 rounded-3xl italic text-slate-600"></div>
            <button onclick="location.reload()" class="btn-action">Intentar de nuevo</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                type: "choice",
                instruction: "Seleccione Verdadero o Falso",
                question: "1. La autoevaluación en el PAMEC es: La Incorporación de los logros y lecciones aprendidas en la cultura de la organización.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Esta pregunta es Falsa porque la autoevaluación en el PAMEC es: El primer paso crítico y sistemático de la ruta crítica, donde la institución analiza su desempeño interno frente a estándares de calidad."
            },
            {
                type: "choice",
                instruction: "Seleccione Verdadero o Falso",
                question: "2. La selección de procesos a mejorar consiste en: La evaluación integral de la organización (cualitativa y cuantitativa) para identificar problemas y oportunidades de mejora.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "La selección de procesos a mejorar consiste en identificar, priorizar y diagnosticar las actividades críticas o ineficientes dentro de una organización."
            },
            {
                type: "choice",
                instruction: "Seleccione Verdadero o Falso",
                question: "3. El PAMEC es un mecanismo sistemático y continuo que usan las instituciones de salud en Colombia para cobrar los servicios y mejorar la calidad de los servicios que prestan a los usuarios.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "El PAMEC no es un proceso de facturación, es un proceso de mejora continua, el cual permite priorizar los procesos a mejorar."
            },
            {
                type: "choice",
                instruction: "Seleccione Verdadero o Falso",
                question: "4. Tres instrumentos para realizar el Pamec son: Listas de chequeo, matrices y evaluaciones.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Los tres instrumentos correctos que se utilizan para realizar el PAMEC son: las listas de chequeo, los planes de acción y los indicadores de calidad."
            },
            {
                type: "drag",
                instruction: "Ejercicio de repaso de arrastre",
                question: "Complete el texto arrastrando las palabras correctas:",
                // El texto usa marcadores [[0]], [[1]], etc.
                text: "El [[0]] de Donabedian es un marco conceptual fundamental para [[1]] la calidad de los servicios de salud, que analiza la atención [[2]] a través de tres categorías interrelacionadas: Estructura, [[3]] y [[4]].",
                words: ["modelo", "evaluar", "sanitaria", "proceso", "resultados"],
                feedback: "El <strong>modelo</strong> de Donabedian es un marco conceptual fundamental para <strong>evaluar</strong> la calidad de los servicios de salud, que analiza la atención <strong>sanitaria</strong> a través de tres categorías interrelacionadas: Estructura, <strong>proceso</strong> y <strong>resultados</strong>."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let maxPossibleScore = 0;

        // Calcular puntaje máximo (Preguntas 1-4 valen 1 pto, la de arrastre vale 5 ptos)
        quizData.forEach(q => {
            if(q.type === 'choice') maxPossibleScore += 1;
            else if(q.type === 'drag') maxPossibleScore += q.words.length;
        });

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `REPASO ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');
            
            const optionsContainer = document.getElementById('options-container');
            const dragContainer = document.getElementById('drag-container');
            
            optionsContainer.innerHTML = '';
            dragContainer.classList.add('hidden');

            if(q.type === 'choice') {
                optionsContainer.classList.remove('hidden');
                q.options.forEach((opt, i) => {
                    const d = document.createElement('div');
                    d.className = "option-card flex items-center p-4 rounded-2xl cursor-pointer hover:bg-slate-50";
                    d.innerHTML = `<input type="radio" name="ans" id="o${i}" value="${i}" class="w-5 h-5 accent-[#054C50]"><label for="o${i}" class="ml-4 w-full cursor-pointer font-medium text-lg">${opt.t}</label>`;
                    d.onclick = () => {
                        if (d.classList.contains('locked')) return;
                        document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                        d.classList.add('selected');
                        d.querySelector('input').checked = true;
                    };
                    optionsContainer.appendChild(d);
                });
            } else if(q.type === 'drag') {
                optionsContainer.classList.add('hidden');
                dragContainer.classList.remove('hidden');
                initDragAndDrop(q);
            }
        }

        function initDragAndDrop(q) {
            const textArea = document.getElementById('drag-text-area');
            const bank = document.getElementById('words-bank');
            
            // Crear el texto con zonas de soltado
            let renderedText = q.text;
            q.words.forEach((_, i) => {
                renderedText = renderedText.replace(`[[${i}]]`, `<span class="drop-zone" data-index="${i}" ondrop="drop(event)" ondragover="allowDrop(event)"></span>`);
            });
            textArea.innerHTML = renderedText;

            // Crear banco de palabras barajado
            bank.innerHTML = '';
            const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
            shuffledWords.forEach((word, i) => {
                const span = document.createElement('span');
                span.className = "drag-word";
                span.innerText = word;
                span.draggable = true;
                span.id = "word-" + i;
                span.ondragstart = drag;
                bank.appendChild(span);
            });
        }

        // Funciones de Drag & Drop
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            
            // Si el destino es una zona de soltado
            if (ev.target.classList.contains('drop-zone')) {
                if(ev.target.children.length > 0) {
                    document.getElementById('words-bank').appendChild(ev.target.children[0]);
                }
                ev.target.appendChild(draggedElement);
            } 
            // Si el destino es el banco de palabras
            else if (ev.target.id === 'words-bank') {
                ev.target.appendChild(draggedElement);
            }
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const fBox = document.getElementById('feedback-box');
            const fTitle = document.getElementById('feedback-title');
            const fBody = document.getElementById('feedback-body');
            
            let isCorrect = false;
            let partialScore = 0;

            if(q.type === 'choice') {
                const sel = document.querySelector('input[name="ans"]:checked');
                if(!sel) return;
                document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
                isCorrect = q.options[sel.value].c;
                if(isCorrect) {
                    score++;
                    fTitle.innerText = "¡Correcto!";
                    fTitle.className = "font-bold text-xl text-green-700";
                    fBox.classList.add('bg-green-50', 'border-green-200');
                } else {
                    fTitle.innerText = "Incorrecto";
                    fTitle.className = "font-bold text-xl text-red-700";
                    fBox.classList.add('bg-red-50', 'border-red-200');
                }
            } else if(q.type === 'drag') {
                const zones = document.querySelectorAll('.drop-zone');
                let allFilled = true;
                zones.forEach((zone, i) => {
                    const wordInZone = zone.children[0]?.innerText || "";
                    if(wordInZone.toLowerCase() === q.words[i].toLowerCase()) {
                        partialScore++;
                        zone.innerHTML = `<span class="correct-word">${wordInZone}</span>`;
                    } else {
                        zone.innerHTML = `<span class="incorrect-word">${wordInZone || '___'}</span>`;
                    }
                });
                score += partialScore;
                isCorrect = (partialScore === q.words.length);
                fTitle.innerText = isCorrect ? "¡Excelente!" : `Obtuviste ${partialScore} de ${q.words.length} aciertos`;
                fTitle.className = isCorrect ? "font-bold text-xl text-green-700" : "font-bold text-xl text-orange-700";
                fBox.classList.add('bg-slate-50', 'border-slate-200');
                document.getElementById('words-bank').classList.add('hidden');
            }

            document.getElementById('btn-validate').classList.add('hidden');
            fBox.classList.remove('hidden');
            fBody.innerHTML = q.feedback;
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / maxPossibleScore) * 100);
            const circle = document.getElementById('final-circle');
            const circumference = 691;
            
            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                let count = 0;
                const timer = setInterval(() => {
                    if(count >= percent) {
                        document.getElementById('result-percent').innerText = percent;
                        clearInterval(timer);
                    } else {
                        count++;
                        document.getElementById('result-percent').innerText = count;
                    }
                }, 15);
            }, 300);

            document.getElementById('result-score').innerText = `Puntaje total: ${score} de ${maxPossibleScore}`;
            const msg = document.getElementById('result-msg');
            
            if(percent === 100) msg.innerHTML = "¡Excelente! Has demostrado un dominio total de los conceptos del PAMEC y Donabedian.";
            else if(percent >= 70) msg.innerHTML = "¡Buen trabajo! Tienes claros los conceptos, aunque hubo pequeños errores.";
            else msg.innerHTML = "Te recomendamos repasar la ruta crítica del PAMEC (Autoevaluación y Selección de procesos) y el modelo de Donabedian.";
        }
    </script>
</body>
</html>
