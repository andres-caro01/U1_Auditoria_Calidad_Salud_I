<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso de Repaso: Calidad en Salud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #004F67;
            --primary-dark: #00779A;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            line-height: 1.6;
            color: #004F67;
            background-color: #f0f5f5;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 850px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #f1f1f1;
        }

        .text-custom { color: var(--primary); }
        .bg-custom { background-color: var(--primary); }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: #f0fdfa;
        }

        .option-card.locked {
            pointer-events: none;
        }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold text-custom mb-6 leading-tight">Ejercicios de Repaso</h1>
            <p class="mb-4 text-slate-600 font-semibold">Calidad en la Prestación de Servicios de Salud</p>
            <p class="mb-12 max-w-2xl text-slate-500">Pon a prueba tus conocimientos sobre normatividad, conceptos básicos y gestión de la calidad en el sector salud.</p>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-10 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-custom text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-custom transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content">
                <p id="q-instruction" class="text-custom font-bold italic mb-2 text-base"></p>
                <h2 id="q-text" class="text-xl font-bold mb-6 leading-snug"></h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="feedback-box" class="hidden mt-6 p-6 rounded-3xl border-2 animate__animated animate__fadeInUp">
                    <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                    <div id="feedback-body" class="text-base leading-relaxed text-slate-700"></div>
                    <button onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-10 py-2 rounded-xl hover:bg-black transition-all font-bold">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-8 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-4">Resultado Final</h2>
            <div class="relative flex items-center justify-center my-6">
                <svg class="w-64 h-64 -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="128" cy="128" r="110" class="circle-bar" stroke-dasharray="691" stroke-dashoffset="691"></circle>
                </svg>
                <div class="absolute text-6xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-2xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-6 bg-slate-50 rounded-3xl italic text-slate-600"></div>
            <button onclick="location.reload()" class="btn-action">Intentar de nuevo</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Se puede decir que la calidad es estar bien.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "Es falso puesto que calidad no solo es estar bien, sino recibir los servicios de salud adecuadamente."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "Ishikawa es el padre de la calidad en salud.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "El padre de la calidad en salud es Avedis Donabedian."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La gestión de calidad es un principio de la administración.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "La gestión de la calidad no es un principio de la administración, es un proceso de la administración."
            },
            {
                instruction: "Seleccione Verdadero o Falso",
                question: "La administración es la base de la calidad en salud.",
                options: [{t: "Verdadero", c: false}, {t: "Falso", c: true}],
                feedback: "La administración no es la base fundamental de la calidad en salud, hace parte del proceso para que se presten los servicios de salud con calidad."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Los indicadores para la evaluación de la calidad de la prestación de un servicio de salud se clasifican como:",
                options: [
                    {t: "Indicadores de estructura, proceso y resultado.", c: true},
                    {t: "Indicadores de evaluación, planes de mejoramientos y de proceso.", c: false},
                    {t: "Indicadores de rendimiento, de oportunidad y de estructura", c: false},
                    {t: "Indicadores de resultado, de administración y de calidad", c: false}
                ],
                feedback: "Los indicadores de calidad en salud se clasifican, según el modelo de Donabedian adoptado internacionalmente y por normativas como el Decreto 1072 de 2015, en <strong>estructura, proceso y resultado</strong>."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "El sistema de calidad es:",
                options: [
                    {t: "Atender bien a los clientes.", c: false},
                    {t: "Prestar un servicio con seguridad.", c: false},
                    {t: "El conjunto de los planes formales de calidad.", c: true},
                    {t: "Un producto brindado con oportunidad.", c: false}
                ],
                feedback: "El sistema de calidad es un conjunto estructurado de políticas, procesos, procedimientos, recursos y responsabilidades, diseñado para dirigir y controlar una organización en términos de calidad."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "La norma que establece la creación del Sistema Obligatorio de Garantía de Calidad o SOGC en Colombia es:",
                options: [
                    {t: "Ley 10 de 1990", c: false},
                    {t: "Ley 100 de 1993", c: false},
                    {t: "Ley 715 de 2001", c: false},
                    {t: "Decreto 2174 de 1996", c: true}
                ],
                feedback: "El Decreto 2174 de 1996 estableció el Sistema Obligatorio de Garantía de Calidad del Sistema General de Seguridad Social en Salud (SGSSS)."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "La norma que establece los cuatro componentes del Sistema Obligatorio de Garantía de calidad en salud es:",
                options: [
                    {t: "Ley 9 de 1979", c: false},
                    {t: "Ley 715 de 2001", c: false},
                    {t: "Decreto 2309 de 2002", c: false},
                    {t: "Decreto 1011 de 2006", c: true}
                ],
                feedback: "Los cuatro componentes (SUH, PAMEC, SUA y SIC) están establecidos por el Decreto 1011 de 2006, compilado luego en el Decreto 780 de 2016."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "El Decreto Único Reglamentario del Sector Salud y Protección Social en Colombia es:",
                options: [
                    {t: "Decreto 1011 de 2006", c: false},
                    {t: "Decreto 780 de 2016", c: true},
                    {t: "Decreto 2309 de 2002", c: false},
                    {t: "Decreto 3158 de 2006", c: false}
                ],
                feedback: "El Decreto 780 de 2016 fue expedido para compilar y racionalizar las normas reglamentarias preexistentes del sector salud."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "La ley 715 de 2001, expone en su contenido:",
                options: [
                    {t: "Los recursos que se asignan del Sistema General de Participaciones SGP a los sectores de salud, Educación y agua potable.", c: true},
                    {t: "Las rentas cedidas, los juegos de azar y agua potable.", c: false},
                    {t: "Los recursos de las cajas de compensación, agua potable y juegos de azar.", c: false},
                    {t: "Los recursos de salud, agua potable y juegos de azar.", c: false}
                ],
                feedback: "La Ley 715 de 2001 regula el SGP para financiar y organizar los servicios de educación, salud, agua potable y saneamiento básico."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "La gestión de calidad comprende:",
                options: [
                    {t: "Verificar, actuar y planear.", c: false},
                    {t: "Planificación, organización y control.", c: true},
                    {t: "Organizar, verificar y actuar.", c: false},
                    {t: "Planear, evaluar y actuar.", c: false}
                ],
                feedback: "Es el conjunto de acciones sistemáticas para planificar, controlar, asegurar y mejorar continuamente la calidad cumpliendo estándares y normas."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Dentro del concepto de calidad existen dos modelos:",
                options: [
                    {t: "El modelo de organizar y el modelo de ejecutar", c: false},
                    {t: "El modelo de evaluar, el modelo basado en evidencias", c: false},
                    {t: "El modelo empírico y el modelo clásico.", c: false},
                    {t: "El modelo industrial y el modelo de Servicios de Salud", c: true}
                ],
                feedback: "Ambos modelos se basan en la autoevaluación para medir la excelencia y promover la mejora continua en sus respectivas áreas."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Tres características de calidad que establece la OMS son:",
                options: [
                    {t: "Un mínimo de riesgo, un alto grado de satisfacción y un impacto final en la salud.", c: true},
                    {t: "Eficacia, eficiencia y efectividad.", c: false},
                    {t: "Oportunidad, accesibilidad y seguimiento", c: false},
                    {t: "Celeridad, oportunidad y equidad.", c: false}
                ],
                feedback: "Esta tríada define el núcleo de la calidad médica: seguridad, experiencia del usuario y resultados clínicos."
            },
            {
                instruction: "Seleccione la respuesta correcta",
                question: "Estrategia de gestión orientada a satisfacer al cliente, empleados, empresa, accionistas y sociedad:",
                options: [
                    {t: "Gestión de calidad.", c: false},
                    {t: "Calidad Total", c: true},
                    {t: "Planificación de la calidad.", c: false},
                    {t: "Organización de la calidad.", c: false}
                ],
                feedback: "La calidad total busca la excelencia involucrando a todos los miembros de la organización para satisfacer a todas las partes interesadas."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `PREGUNTA ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = "option-card flex items-center p-4 rounded-2xl cursor-pointer hover:bg-slate-50";
                d.innerHTML = `
                    <input type="radio" name="ans" id="o${i}" value="${i}" class="w-5 h-5 accent-[#054C50]">
                    <label for="o${i}" class="ml-4 w-full cursor-pointer font-medium text-lg">${opt.t}</label>
                `;
                d.onclick = () => {
                    if (d.classList.contains('locked')) return;
                    document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    d.querySelector('input').checked = true;
                };
                container.appendChild(d);
            });
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const sel = document.querySelector('input[name="ans"]:checked');
            
            if(!sel) return;

            // Bloquear opciones
            document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
            
            const isCorrect = q.options[sel.value].c;
            if(isCorrect) score++;
            
            const fBox = document.getElementById('feedback-box');
            fBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            document.getElementById('btn-validate').classList.add('hidden');

            const fTitle = document.getElementById('feedback-title');
            if(isCorrect) {
                fTitle.innerText = "¡Correcto!";
                fTitle.className = "font-bold text-xl text-green-700 mb-1";
                fBox.classList.add('bg-green-50', 'border-green-200');
            } else {
                fTitle.innerText = "Incorrecto";
                fTitle.className = "font-bold text-xl text-red-700 mb-1";
                fBox.classList.add('bg-red-50', 'border-red-200');
            }
            
            document.getElementById('feedback-body').innerHTML = q.feedback;
        }

        function nextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / quizData.length) * 100);
            const circle = document.getElementById('final-circle');
            const circumference = 691; // 2 * PI * 110
            
            // Animación de la barra circular
            setTimeout(() => {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                
                // Contador numérico
                let count = 0;
                const timer = setInterval(() => {
                    if(count >= percent) {
                        document.getElementById('result-percent').innerText = percent;
                        clearInterval(timer);
                    } else {
                        count++;
                        document.getElementById('result-percent').innerText = count;
                    }
                }, 15);
            }, 300);

            document.getElementById('result-score').innerText = `Puntaje: ${score} de ${quizData.length}`;
            const msg = document.getElementById('result-msg');
            
            if(percent === 100) msg.innerHTML = "¡Excelente! Dominas todos los conceptos de calidad en salud.";
            else if(percent >= 70) msg.innerHTML = "¡Muy bien! Tienes un buen conocimiento de la normativa y procesos.";
            else msg.innerHTML = "Sigue repasando los conceptos y la normatividad (Decretos 780 y 1011).";
        }
    </script>
</body>
</html>
