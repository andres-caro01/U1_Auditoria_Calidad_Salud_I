<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Especialistas en Calidad - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(137deg, rgb(255, 0, 179) 0%, rgba(0,212,255,1) 100%);
            --bg-dark: #181818;
            --shadow-glow: rgba(209, 38, 197, 0.5);
        }

        body {
            background-color: #0f0f0f;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            justify-items: center;
        }

        /* --- TARJETAS --- */
        .card {
            position: relative;
            width: 230px;
            height: 280px;
            background: var(--primary-gradient);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 30px;
            filter: drop-shadow(0px 0px 15px var(--shadow-glow));
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
        }

        .card::after {
            content: '';
            background-color: var(--bg-dark);
            position: absolute;
            z-index: 1;
            height: 96%;
            width: 96%;
            top: 2%;
            left: 2%;
            border-radius: 28px;
            transition: 0.3s ease;
        }

        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 15px;
        }

        .card-content h3 {
            margin: 0;
            font-size: 1.4rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.05);
            filter: drop-shadow(0px 0px 30px rgba(209, 38, 197, 0.9));
        }

        /* --- MODAL RESPONSIVO --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            position: relative;
            width: 100%;
            max-width: 650px;
            background: var(--primary-gradient);
            padding: 2px;
            border-radius: 30px;
            filter: drop-shadow(0px 0px 40px var(--shadow-glow));
            animation: modalIn 0.3s ease-out;
        }

        .modal-inner {
            background-color: var(--bg-dark);
            border-radius: 28px;
            padding: 45px 35px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #222;
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: var(--primary-gradient);
            transform: rotate(90deg);
        }

        .modal-inner h2 {
            margin-top: 0;
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-inner p {
            color: #ddd;
            line-height: 1.7;
            font-size: 0.95rem;
            text-align: justify;
        }

        .modal-inner ul {
            margin: 15px 0;
            padding-left: 20px;
            color: #bbb;
        }

        .modal-inner li {
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        @keyframes modalIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .active { display: flex; }

        @media (max-width: 480px) {
            .modal-inner { padding: 35px 20px; }
            .card { width: 180px; height: 240px; }
            .modal-inner h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" onclick="openModal('deming')">
            <div class="card-content"><h3>Edward Deming</h3></div>
        </div>
        <div class="card" onclick="openModal('shewhart')">
            <div class="card-content"><h3>Walter Shewhart</h3></div>
        </div>
        <div class="card" onclick="openModal('ishikawa')">
            <div class="card-content"><h3>Kaoru Ishikawa</h3></div>
        </div>
        <div class="card" onclick="openModal('juran')">
            <div class="card-content"><h3>Joseph Juran</h3></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-inner">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script>
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');

        const dataContent = {
            deming: {
                titulo: "Edward Deming",
                p1: "Entre las diferentes aportaciones de este autor caben destacar dos: sus catorce puntos para la gestión y la divulgación del ciclo PHVA de Shewhart. Deming pretende mostrar la importancia de las personas y en particular el de la dirección en la competitividad. Los catorce puntos se pueden resumir en:",
                items: [
                    "Constancia para mejorar.", "Adaptación de la organización a la economía vigente.", "Evitar la inspección masiva de productos.", "Compras por calidad.", "Mejorar continuamente.", "Formación de los trabajadores en su desempeño.", "Impulsar el liderazgo.", "Eliminación del miedo.", "Romper las barreras entre las áreas de la empresa.", "Sustituir el eslogan por acciones de mejoras.", "Eliminar estándares de trabajo e implantar la mejora continua.", "Impulsar el orgullo por el trabajo.", "Estimular la mejora personal de los empleados.", "Aplicar el método PHVA como elementos de transformación."
                ],
                p2: ""
            },
            shewhart: {
                titulo: "Walter Shewhart",
                p1: "Es conocido por el ciclo PHVA (Planear, hacer, verificar y actuar). Es un proceso metodológico básico para realizar las actividades de mejora y soporte de lo mejorado. También se le conoce por el \"control estadístico de procesos\" como una metodología de mejoramiento continuo de los procesos.",
                items: [],
                p2: "Este proceso fue utilizado por otros autores, especialmente Deming, como herramienta para la mejora continua y para identificar la problemática se utilizan diferentes estrategias en cada una de las fases."
            },
            ishikawa: {
                titulo: "Kaoru Ishikawa",
                p1: "Desarrolla los círculos de calidad en 1962 como una necesidad de involucrar a todos los trabajadores en el aseguramiento de la calidad. Un círculo de calidad es un pequeño grupo compuesto por personas voluntarias, para resolver los problemas de los niveles más operativos de la organización. Estos persiguen como objetivo la obtención de mejoras puntuales en el seno de la organización en un área de trabajo específica para resolver un problema. La implementación de estas concepciones ha permitido el desarrollo de diferentes herramientas que se pueden emplear como apoyo para resolver los problemas planteados y que se han tornado clásicas:",
                items: [
                    "Diagrama de Pareto.", "Diagrama causa efecto.", "Histograma.", "Gráficos de control.", "Diagrama de dispersión."
                ],
                p2: "Posteriormente aparecieron otras estrategias con diferentes herramientas como: diagrama de flujo, tormenta de ideas, diagrama de Gant, diagrama de afinidad, diagrama de árbol, diagrama matricial, análisis factorial de datos, y diagrama sagital, términos que se emplean con alguna regularidad por diferentes autores."
            },
            juran: {
                titulo: "Joseph Juran",
                p1: "La trilogía de Juran sobre la gestión de la calidad se basa en la planificación de la calidad, control de la calidad y mejora de la calidad. En la planificación, se fijan parámetros sobre \"costes de mala calidad\" y sus acciones para eliminarlos.",
                items: [],
                p2: "El control de calidad durante el proceso de fabricación asegura el cumplimiento de los parámetros establecidos anteriormente. La mejora de los productos y la disminución de los costos en general."
            }
        };

        function openModal(key) {
            const item = dataContent[key];
            let listHtml = item.items.length > 0 ? `<ul>${item.items.map(i => `<li>${i}</li>`).join('')}</ul>` : '';
            
            modalBody.innerHTML = `
                <h2>${item.titulo}</h2>
                <p>${item.p1}</p>
                ${listHtml}
                <p>${item.p2}</p>
            `;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => { if (e.key === "Escape") closeModal(); });
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    </script>
</body>
</html>
